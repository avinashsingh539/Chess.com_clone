<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzles — Chess.com Clone</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/board.css">
  <style>
    .puzzle-page {
      display: flex;
      align-items: flex-start;
      gap: 28px;
      padding: 32px 36px;
      min-height: 100vh;
      flex-wrap: wrap;
    }
    .puzzle-board-col { flex-shrink: 0; }
    .puzzle-info-col  { flex: 1; min-width: 240px; max-width: 320px; display: flex; flex-direction: column; gap: 14px; }

    .puzzle-header { font-size: 1.4rem; font-weight: 800; color: var(--text-primary); }
    .puzzle-meta   { font-size: 0.85rem; color: var(--text-muted); }

    /* Feedback message */
    .feedback-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      min-height: 46px;
    }

    /* Progress dots */
    .progress-dots { display: flex; gap: 8px; align-items: center; }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--border-color);
      transition: background 0.3s;
    }
    .dot.solved  { background: var(--green-primary); }
    .dot.current { background: var(--text-muted); border: 2px solid var(--green-primary); }

    @media (max-width: 860px) {
      .puzzle-page { flex-direction: column; align-items: center; padding: 16px; }
      .puzzle-info-col { max-width: 100%; width: 100%; }
    }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>

  <div class="layout">
    <main class="main-content">
      <div class="puzzle-page">

        <!-- Board column -->
        <div class="puzzle-board-col">
          <div class="board-wrap">
            <div class="board-files" id="pz-files-top"></div>
            <div style="display:flex;align-items:center;">
              <div id="pz-ranks-left"  style="display:flex;flex-direction:column;"></div>
              <div class="chess-board" id="puzzle-board"></div>
              <div id="pz-ranks-right" style="display:flex;flex-direction:column;"></div>
            </div>
            <div class="board-files" id="pz-files-bottom"></div>
          </div>
        </div>

        <!-- Info column -->
        <div class="puzzle-info-col">
          <div>
            <div class="puzzle-header">♟ Chess Puzzles</div>
            <div class="puzzle-meta" id="pz-meta">Puzzle 1 of 5</div>
          </div>

          <!-- Progress dots -->
          <div class="progress-dots" id="pz-dots"></div>

          <!-- Puzzle description -->
          <div class="card-dark" style="padding:14px 16px;">
            <div style="font-weight:700;margin-bottom:6px;color:var(--text-primary);" id="pz-title">Find the best move</div>
            <div style="font-size:0.85rem;color:var(--text-secondary);" id="pz-desc">White to move</div>
          </div>

          <!-- Feedback -->
          <div class="feedback-box" id="pz-feedback" style="color:var(--text-muted);">
            Select a piece to begin.
          </div>

          <!-- Next button -->
          <button class="btn-green" id="btn-next-puzzle" style="display:none;">Next Puzzle →</button>
          <button class="btn-green" id="btn-restart" style="background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-primary);margin-top:4px;">↺ Restart Puzzles</button>
        </div>

      </div>
    </main>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/puzzles.js"></script>
</body>
</html>
